[Interface]
# Server B's IP inside the VPN tunnel
Address = 10.99.0.2/24
# Fill in after running: wg genkey on Server B
PrivateKey = REPLACE_WITH_SERVER_B_PRIVATE_KEY

[Peer]
# Server A
PublicKey = REPLACE_WITH_SERVER_A_PUBLIC_KEY
# Server A's real public IP and WireGuard port
Endpoint = REPLACE_WITH_SERVER_A_PUBLIC_IP:51820
# Route only VPN subnet through tunnel
AllowedIPs = 10.99.0.0/24
PersistentKeepalive = 25
