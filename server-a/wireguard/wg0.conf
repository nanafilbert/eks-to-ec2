[Interface]
# Server A's IP inside the VPN tunnel
Address = 10.99.0.1/24
# Fill in after running: wg genkey on Server A
PrivateKey = REPLACE_WITH_SERVER_A_PRIVATE_KEY
# WireGuard listens on this port (open in security group)
ListenPort = 51820

[Peer]
# Server B
# Fill in after generating keys on Server B
PublicKey = REPLACE_WITH_SERVER_B_PUBLIC_KEY
# Only Server B's VPN IP is routed through the tunnel
AllowedIPs = 10.99.0.2/32
# Keeps connection alive through NAT/firewalls
PersistentKeepalive = 25
