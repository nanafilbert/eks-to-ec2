# ── HTTP server ───────────────────────────────────────────────────────
# ALB terminates SSL and forwards plain HTTP to us on port 80.
# We just proxy straight to Django. No SSL blocks needed here.
server {
    listen 80;
    server_name _;

    # ALB health check — returns 200 instantly, no Django involved
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Pass real client IP from ALB through to Django
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Max upload size
    client_max_body_size 50M;

    # All traffic -> Django (Gunicorn on port 8000)
    # 'backend' is the Docker container name — Docker resolves it
    location / {
        proxy_pass http://backend:8000\;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
